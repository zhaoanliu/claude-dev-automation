name: Install Claude Code
description: >
  Cache and install the Claude Code CLI, wrapped so every invocation auto-injects
  --dangerously-skip-permissions, --model, and --output-format json, extracts the
  result text (so `| tee` / grep / PIPESTATUS patterns work unchanged), appends a
  cost line to $GITHUB_STEP_SUMMARY, and optionally POSTs run telemetry to any
  PostgREST-compatible endpoint (e.g. a Supabase table).

inputs:
  claude-code-version:
    description: Exact @anthropic-ai/claude-code version to install (never use "latest" — unpinned installs are non-deterministic and rate-limit-prone)
    required: false
    default: '2.1.145'
  model:
    description: Default model exported as CLAUDE_MODEL (override per step with a step-level env)
    required: false
    default: 'claude-sonnet-5'
  telemetry-url:
    description: Base URL of a PostgREST-compatible endpoint for cost/metadata logging (e.g. a Supabase project URL). Leave empty to disable telemetry.
    required: false
    default: ''
  telemetry-api-key:
    description: API key for the telemetry endpoint (e.g. Supabase service role key)
    required: false
    default: ''
  telemetry-table:
    description: Table name the telemetry payload is POSTed to
    required: false
    default: 'workflow_runs'

runs:
  using: composite
  steps:
    - name: Cache Claude Code
      uses: actions/cache@v5
      with:
        path: ~/.npm-global
        key: claude-code-${{ runner.os }}-${{ inputs.claude-code-version }}

    - name: Install Claude Code
      shell: bash
      run: |
        npm config set prefix "$HOME/.npm-global"
        npm install -g @anthropic-ai/claude-code@${{ inputs.claude-code-version }}
        echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
        echo "CLAUDE_MODEL=${{ inputs.model }}" >> "$GITHUB_ENV"
        echo "CLAUDE_TELEMETRY_URL=${{ inputs.telemetry-url }}" >> "$GITHUB_ENV"
        echo "CLAUDE_TELEMETRY_KEY=${{ inputs.telemetry-api-key }}" >> "$GITHUB_ENV"
        echo "CLAUDE_TELEMETRY_TABLE=${{ inputs.telemetry-table }}" >> "$GITHUB_ENV"
        mv "$HOME/.npm-global/bin/claude" "$HOME/.npm-global/bin/_claude_bin"
        cat > "$HOME/.npm-global/bin/claude" << 'WRAPPER_EOF'
        #!/bin/bash
        for arg in "$@"; do
          [[ "$arg" == "--version" || "$arg" == "--help" ]] && exec _claude_bin "$@"
        done
        RAW_JSON=/tmp/claude_raw.json
        MAX_TURNS_VAL="" _prev=""
        for _arg in "$@"; do
          [[ "$_prev" == "--max-turns" ]] && { MAX_TURNS_VAL="$_arg"; break; }
          _prev="$_arg"
        done
        START_SECONDS=$SECONDS
        _claude_bin --dangerously-skip-permissions --model "${CLAUDE_MODEL}" --output-format json "$@" > "$RAW_JSON" 2>&1
        EXIT=$?
        DURATION_SECONDS=$((SECONDS - START_SECONDS))
        { jq -re '.result // ""' "$RAW_JSON" 2>/dev/null || cat "$RAW_JSON"; }
        jq -r '"cost=$\(.total_cost_usd // 0) in=\(.usage.input_tokens // 0) cache=\(.usage.cache_read_input_tokens // 0) out=\(.usage.output_tokens // 0)"' "$RAW_JSON" >> "${GITHUB_STEP_SUMMARY:-/dev/null}" 2>/dev/null || true
        if [[ -n "${CLAUDE_TELEMETRY_URL:-}" && -n "${CLAUDE_TELEMETRY_KEY:-}" ]]; then
          PAYLOAD=$(jq -n \
            --arg wf  "${GITHUB_WORKFLOW:-}" \
            --arg rid "${GITHUB_RUN_ID:-}" \
            --arg att "${GITHUB_RUN_ATTEMPT:-1}" \
            --arg job "${GITHUB_JOB:-}" \
            --arg br  "${GITHUB_REF_NAME:-}" \
            --arg act "${GITHUB_ACTOR:-}" \
            --arg evt "${GITHUB_EVENT_NAME:-}" \
            --arg mdl "${CLAUDE_MODEL:-}" \
            --arg sha "${GITHUB_SHA:-}" \
            --arg mt  "${MAX_TURNS_VAL:-}" \
            --arg dur "${DURATION_SECONDS:-}" \
            --arg ec  "${EXIT:-}" \
            --slurpfile raw "$RAW_JSON" \
            '{
              workflow_name:         $wf,
              run_id:                $rid,
              run_attempt:           ($att | try tonumber catch null),
              job_name:              $job,
              branch:                $br,
              actor:                 $act,
              event_name:            $evt,
              model:                 $mdl,
              sha:                   $sha,
              cost_usd:              ($raw[0].total_cost_usd // null),
              input_tokens:          ($raw[0].usage.input_tokens // null),
              cache_read_tokens:     ($raw[0].usage.cache_read_input_tokens // null),
              cache_creation_tokens: ($raw[0].usage.cache_creation_input_tokens // null),
              output_tokens:         ($raw[0].usage.output_tokens // null),
              num_turns:             ($raw[0].num_turns // null),
              max_turns:             ($mt | if . == "" then null else try tonumber catch null end),
              duration_seconds:      ($dur | if . == "" then null else try tonumber catch null end),
              exit_code:             ($ec | if . == "" then null else try tonumber catch null end),
              is_error:              ($raw[0].is_error // false)
            }' 2>/dev/null)
          if [[ -n "$PAYLOAD" ]]; then
            curl -s -o /dev/null \
              -X POST "${CLAUDE_TELEMETRY_URL}/rest/v1/${CLAUDE_TELEMETRY_TABLE}" \
              -H "apikey: ${CLAUDE_TELEMETRY_KEY}" \
              -H "Authorization: Bearer ${CLAUDE_TELEMETRY_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || true
          fi
        fi
        exit $EXIT
        WRAPPER_EOF
        chmod +x "$HOME/.npm-global/bin/claude"
